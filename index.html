<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Booking App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #111827;
      --accent: #c9a35b;
      --danger: #b91c1c;
      --success: #166534;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .brand {
      font-size: 24px;
      font-weight: 700;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.04);
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-size: 14px;
      font-weight: 600;
    }

    input, select, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 11px 12px;
      font-size: 14px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      background: var(--primary);
      color: #fff;
      border: none;
    }

    button.secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.danger {
      background: var(--danger);
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row > * { flex: 1; }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: end;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .toolbar .field {
      min-width: 180px;
      flex: 1;
    }

    .appt-list {
      display: grid;
      gap: 12px;
    }

    .appt {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .appt-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      flex-wrap: wrap;
    }

    .appt-title {
      font-weight: 700;
      font-size: 16px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #f3f4f6;
      border: 1px solid var(--line);
    }

    .status-confirmed { color: var(--success); }
    .status-cancelled { color: var(--danger); }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .actions button {
      width: auto;
      padding: 10px 14px;
    }

    .auth-box {
      max-width: 420px;
      margin: 80px auto;
    }

    .hidden { display: none !important; }

    .msg {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      background: #f3f4f6;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 30px 12px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: #fcfcfd;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="authView" class="wrap auth-box">
    <div class="card">
      <h2>Doctor Booking App</h2>
      <p class="sub">Login for the doctor and receptionist. This app uses Supabase Auth and live appointment sync.</p>

      <label>Email</label>
      <input id="loginEmail" type="email" placeholder="name@example.com" />

      <label>Password</label>
      <input id="loginPassword" type="password" placeholder="Enter password" />

      <div class="row" style="margin-top: 14px;">
        <button id="loginBtn">Login</button>
      </div>

      <div id="authMsg" class="msg hidden"></div>
    </div>
  </div>

  <div id="appView" class="wrap hidden">
    <div class="topbar">
      <div>
        <div class="brand">Doctor Booking App</div>
        <div class="sub">Shared live bookings for the doctor and receptionist</div>
      </div>
      <div>
        <div id="userEmail" class="muted" style="margin-bottom: 8px;"></div>
        <button id="logoutBtn" class="secondary">Logout</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2 id="formTitle">New Appointment</h2>

        <label>Patient Name</label>
        <input id="patientName" type="text" placeholder="Enter patient name" />

        <label>Phone Number</label>
        <input id="patientPhone" type="text" placeholder="Enter phone number" />

        <div class="row">
          <div>
            <label>Date</label>
            <input id="appointmentDate" type="date" />
          </div>
          <div>
            <label>Time</label>
            <input id="appointmentTime" type="time" />
          </div>
        </div>

        <label>Status</label>
        <select id="appointmentStatus">
          <option value="booked">Booked</option>
          <option value="confirmed">Confirmed</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>

        <label>Notes</label>
        <textarea id="appointmentNotes" placeholder="Notes for this appointment"></textarea>

        <div class="row" style="margin-top: 14px;">
          <button id="saveBtn">Save Appointment</button>
          <button id="clearBtn" class="secondary">Clear</button>
        </div>

        <div id="formMsg" class="msg hidden"></div>
      </div>

      <div class="card">
        <h2>Appointments</h2>

        <div class="toolbar">
          <div class="field">
            <label>Filter by Date</label>
            <input id="filterDate" type="date" />
          </div>
          <div class="field">
            <label>Search</label>
            <input id="searchText" type="text" placeholder="Patient name or phone" />
          </div>
          <div style="min-width: 150px;">
            <button id="todayBtn" class="secondary">Today</button>
          </div>
        </div>

        <div id="appointmentList" class="appt-list"></div>
      </div>
    </div>
  </div>

  <script>
    // 1) REPLACE THESE WITH YOUR SUPABASE PROJECT VALUES
    const SUPABASE_URL = 'https://vhkrtymeyorrcaolygbo.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZoa3J0eW1leW9ycmNhb2x5Z2JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4Njc3OTAsImV4cCI6MjA5MjQ0Mzc5MH0.p_Pe8Ca-CumMYnqlUrxfU_CWtaHC4jQ_f-zHmwmUIhc';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let editingId = null;
    let allAppointments = [];
    let appointmentsChannel = null;

    const authView = document.getElementById('authView');
    const appView = document.getElementById('appView');
    const authMsg = document.getElementById('authMsg');
    const formMsg = document.getElementById('formMsg');
    const userEmail = document.getElementById('userEmail');
    const formTitle = document.getElementById('formTitle');

    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');

    const patientName = document.getElementById('patientName');
    const patientPhone = document.getElementById('patientPhone');
    const appointmentDate = document.getElementById('appointmentDate');
    const appointmentTime = document.getElementById('appointmentTime');
    const appointmentStatus = document.getElementById('appointmentStatus');
    const appointmentNotes = document.getElementById('appointmentNotes');

    const filterDate = document.getElementById('filterDate');
    const searchText = document.getElementById('searchText');
    const appointmentList = document.getElementById('appointmentList');

    function showMessage(el, text, isError = false) {
      el.textContent = text;
      el.classList.remove('hidden');
      el.style.color = isError ? '#b91c1c' : '#111827';
      el.style.background = isError ? '#fee2e2' : '#f3f4f6';
      el.style.border = isError ? '1px solid #fecaca' : '1px solid #e5e7eb';
    }

    function hideMessage(el) {
      el.classList.add('hidden');
    }

    function setTodayDefault() {
      const today = new Date().toISOString().split('T')[0];
      appointmentDate.value = today;
      filterDate.value = today;
    }

    function clearForm() {
      editingId = null;
      formTitle.textContent = 'New Appointment';
      patientName.value = '';
      patientPhone.value = '';
      appointmentTime.value = '';
      appointmentStatus.value = 'booked';
      appointmentNotes.value = '';
      hideMessage(formMsg);
    }

    function sortAppointments(items) {
      return items.sort((a, b) => {
        const aKey = `${a.appointment_date} ${a.appointment_time}`;
        const bKey = `${b.appointment_date} ${b.appointment_time}`;
        return aKey.localeCompare(bKey);
      });
    }

    function renderAppointments() {
      const dateFilter = filterDate.value || '';
      const query = searchText.value.trim().toLowerCase();

      let items = [...allAppointments];

      if (dateFilter) {
        items = items.filter(a => a.appointment_date === dateFilter);
      }

      if (query) {
        items = items.filter(a =>
          (a.patient_name || '').toLowerCase().includes(query) ||
          (a.patient_phone || '').toLowerCase().includes(query)
        );
      }

      items = sortAppointments(items);

      if (!items.length) {
        appointmentList.innerHTML = '<div class="empty">No appointments found for this view.</div>';
        return;
      }

      appointmentList.innerHTML = items.map(a => {
        const statusClass = a.status === 'confirmed'
          ? 'status-confirmed'
          : a.status === 'cancelled'
            ? 'status-cancelled'
            : '';

        return `
          <div class="appt">
            <div class="appt-head">
              <div>
                <div class="appt-title">${escapeHtml(a.patient_name || '')}</div>
                <div class="muted">${escapeHtml(a.patient_phone || '')}</div>
                <div class="muted" style="margin-top: 6px;">
                  ${escapeHtml(a.appointment_date || '')} at ${escapeHtml(a.appointment_time || '')}
                </div>
              </div>
              <div class="pill ${statusClass}">${escapeHtml(a.status || 'booked')}</div>
            </div>
            <div style="margin-top: 10px; white-space: pre-wrap;">${escapeHtml(a.notes || '')}</div>
            <div class="actions">
              <button class="secondary" onclick="startEdit('${a.id}')">Edit</button>
              <button class="danger" onclick="deleteAppointment('${a.id}')">Delete</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function loadAppointments() {
      const { data, error } = await supabaseClient
        .from('appointments')
        .select('*')
        .order('appointment_date', { ascending: true })
        .order('appointment_time', { ascending: true });

      if (error) {
        showMessage(formMsg, error.message, true);
        return;
      }

      allAppointments = data || [];
      renderAppointments();
    }

    async function saveAppointment() {
      hideMessage(formMsg);

      const payload = {
        patient_name: patientName.value.trim(),
        patient_phone: patientPhone.value.trim(),
        appointment_date: appointmentDate.value,
        appointment_time: appointmentTime.value,
        status: appointmentStatus.value,
        notes: appointmentNotes.value.trim(),
        updated_by: currentUser?.email || null
      };

      if (!payload.patient_name || !payload.appointment_date || !payload.appointment_time) {
        showMessage(formMsg, 'Patient name, date, and time are required.', true);
        return;
      }

      const clashQuery = supabaseClient
        .from('appointments')
        .select('id')
        .eq('appointment_date', payload.appointment_date)
        .eq('appointment_time', payload.appointment_time);

      const { data: clashes, error: clashError } = editingId
        ? await clashQuery.neq('id', editingId)
        : await clashQuery;

      if (clashError) {
        showMessage(formMsg, clashError.message, true);
        return;
      }

      if (clashes && clashes.length > 0) {
        showMessage(formMsg, 'That date and time is already booked.', true);
        return;
      }

      let result;

      if (editingId) {
        result = await supabaseClient
          .from('appointments')
          .update(payload)
          .eq('id', editingId)
          .select()
          .single();
      } else {
        payload.created_by = currentUser?.email || null;
        result = await supabaseClient
          .from('appointments')
          .insert(payload)
          .select()
          .single();
      }

      if (result.error) {
        showMessage(formMsg, result.error.message, true);
        return;
      }

      showMessage(formMsg, editingId ? 'Appointment updated.' : 'Appointment created.');
      clearForm();
      await loadAppointments();
    }

    async function startEditInternal(id) {
      const item = allAppointments.find(a => a.id === id);
      if (!item) return;

      editingId = item.id;
      formTitle.textContent = 'Edit Appointment';
      patientName.value = item.patient_name || '';
      patientPhone.value = item.patient_phone || '';
      appointmentDate.value = item.appointment_date || '';
      appointmentTime.value = item.appointment_time || '';
      appointmentStatus.value = item.status || 'booked';
      appointmentNotes.value = item.notes || '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteAppointmentInternal(id) {
      const confirmed = window.confirm('Delete this appointment?');
      if (!confirmed) return;

      const { error } = await supabaseClient
        .from('appointments')
        .delete()
        .eq('id', id);

      if (error) {
        showMessage(formMsg, error.message, true);
        return;
      }

      if (editingId === id) clearForm();
      await loadAppointments();
    }

    window.startEdit = startEditInternal;
    window.deleteAppointment = deleteAppointmentInternal;

    async function login() {
      hideMessage(authMsg);
      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        showMessage(authMsg, 'Enter your email address and password.', true);
        return;
      }

      const loginBtn = document.getElementById('loginBtn');
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
          showMessage(authMsg, error.message || 'Login failed.', true);
          return;
        }

        if (!data?.session) {
          showMessage(authMsg, 'Login did not return a session. Check your Supabase Auth settings and users.', true);
          return;
        }

        applySession(data.session);
        showMessage(authMsg, 'Login successful.');
      } catch (err) {
        showMessage(authMsg, err?.message || 'Unexpected login error.', true);
        console.error('Login error:', err);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }

    async function logout() {
      await supabaseClient.auth.signOut();
    }

    async function setSessionView() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      applySession(session);
    }

    function applySession(session) {
      if (session?.user) {
        currentUser = session.user;
        userEmail.textContent = `Logged in as ${currentUser.email}`;
        authView.classList.add('hidden');
        appView.classList.remove('hidden');
        loadAppointments();
        subscribeToRealtime();
      } else {
        currentUser = null;
        appView.classList.add('hidden');
        authView.classList.remove('hidden');
        unsubscribeFromRealtime();
      }
    }

    function subscribeToRealtime() {
      unsubscribeFromRealtime();

      appointmentsChannel = supabaseClient
        .channel('appointments-live')
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'appointments'
        }, async () => {
          await loadAppointments();
        })
        .subscribe();
    }

    function unsubscribeFromRealtime() {
      if (appointmentsChannel) {
        supabaseClient.removeChannel(appointmentsChannel);
        appointmentsChannel = null;
      }
    }

    document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('saveBtn').addEventListener('click', saveAppointment);
    document.getElementById('clearBtn').addEventListener('click', clearForm);
    document.getElementById('todayBtn').addEventListener('click', () => {
      const today = new Date().toISOString().split('T')[0];
      filterDate.value = today;
      renderAppointments();
    });

    filterDate.addEventListener('input', renderAppointments);
    searchText.addEventListener('input', renderAppointments);

    supabaseClient.auth.onAuthStateChange((event, session) => {
      console.log('Auth state changed:', event, !!session);
      applySession(session);
    });

    setTodayDefault();
    setSessionView();
  </script>
</body>
</html>
